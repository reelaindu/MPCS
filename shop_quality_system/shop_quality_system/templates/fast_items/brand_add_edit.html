{% extends "base.html" %}
{% block title %}Brand{% endblock %}
{% block page_title %}Brand{% endblock %}
{% block page_subtitle %}{{ "Add new brand" if mode=="add" else "Edit brand" }}{% endblock %}

{% block content %}
<div class="d-flex align-items-center justify-content-between mb-3">
  <h3 class="mb-0">{{ "Add Brand" if mode=="add" else "Edit Brand" }}</h3>
  <a class="btn btn-outline-secondary" href="{{ url_for('fast_items_brands') }}">Back</a>
</div>

<div class="card p-4">
  <form method="post" class="row g-3">
    <div class="col-12">
      <label class="form-label">Brand Name</label>
      <input class="form-control" name="brand_name" required value="{{ brand.brand_name if brand else '' }}" placeholder="Enter brand name">
    </div>

    <div class="col-12 d-flex gap-2">
      <button class="btn btn-primary">Save</button>
      <a class="btn btn-outline-secondary" href="{{ url_for('fast_items_brands') }}">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
